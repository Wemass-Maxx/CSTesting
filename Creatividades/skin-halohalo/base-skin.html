<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>base-skin — Desktop Ad Skin Maqueta</title>
    <link rel="stylesheet" href="site.css" />
    <link rel="stylesheet" href="outer.css" />
    <!--
    VARIANTE DERIVADA: añadir aquí el CSS específico del skin, después de base-skin.css.
    Ejemplo: <link rel="stylesheet" href="skin-classic.css" />
  -->
  </head>

  <body>

    <!-- ============================================================
       SIMULACIÓN DE WEBSITE
       Nodo central que representa el contenido de la página anfitriona.
       No forma parte del sistema WMS — solo para contextualizar la maqueta.
       ============================================================ -->
    <div class="site-content">
      <div class="site-content__inner">
        <div class="site-content__block site-content__block--header"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--footer"></div>
      </div>
    </div>
    <!-- FIN SIMULACIÓN DE WEBSITE -->

    <div class="wms-full-bg">
      <div class="wms-stickyWrapper">
        <div class="wms-sticky">
          <div class="wms-centerContents">
            <div class="wms-skinbg wms-centeredContent">
              <div class="wms-skinimg wms-skinimg--placeholder">
                <img src="skin-halo/1000.jpg" alt="bg">
              </div>
              <div class="wms-safezone">
              </div>
            </div>
          </div>
        </div>
        <div class="wms-cc"></div>
        <div class="wms-siteBgHelper -wms1000"> </div>
      </div>
    </div>
    <div class="wms-full-fg -wms-expanded wms-expanded-halo">
      <div class="wms-stickyWrapper">
        <div class="wms-sticky">
          <div class="wms-centerContents">
            <div class="wms-skinbg wms-centeredContent">
              <div class="wms-skinimg">
                <img class="wms-halo-fg" src="skin-halo/1000.jpg" alt="bg">
              </div>
              <div class="wms-halo">
                <div class="wms-halo-buttoncontainer">
                  <div class="wms-box-btns -wms-generalbtns">
                    <div class="wms-btn-close"> </div>
                  </div>
                </div>
                <div class="wms-halo-content">
                  <img src="skin-halo/BANNER.png" alt="banner">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="wms-halo">
        <div class="wms-halo-buttoncontainer">
          <div class="wms-box-btns -wms-generalbtns">
            <div class="wms-btn-close"> </div>
          </div>
        </div>
        <div class="wms-halo-content">
          <img src="skin-halo/BANNER.png" alt="banner">
        </div>
      </div>
    </div>
    
  </body>
</html>
