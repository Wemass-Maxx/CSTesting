<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skin Data Futbol — Desktop Ad Skin Maqueta</title>
    <link rel="stylesheet" href="site.css" />
    <link rel="stylesheet" href="skin-data-futbol.css" />
    <!--
    VARIANTE DERIVADA: añadir aquí el CSS específico del skin, después de base-skin.css.
    Ejemplo: <link rel="stylesheet" href="skin-classic.css" />
  --></head>

  <body>
    <!-- ============================================================
       SIMULACIÓN DE WEBSITE
       Nodo central que representa el contenido de la página anfitriona.
       No forma parte del sistema WMS — solo para contextualizar la maqueta.
       ============================================================ -->
    <div class="site-content">
      <div class="site-content__inner">
        <div class="site-content__block site-content__block--header"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--body"></div>
        <div class="site-content__block site-content__block--footer"></div>
      </div>
    </div>
    <!-- FIN SIMULACIÓN DE WEBSITE -->

    <div class="wms-full-bg">
      <div class="wms-stickyWrapper">
        <div class="wms-sticky">
          <div class="wms-centerContents">
            <div class="wms-skinbg wms-centeredContent">
              <div class="wms-skinimg">
                <img src="1000.jpg" alt="bg" />
              </div>
              <div class="wms-safezone"></div>
            </div>
          </div>
        </div>
        <div class="wms-cc"></div>
        <div class="wms-siteBgHelper -wms1000"></div>
      </div>
      <div class="wms-header-block">
        <div class="wms-cont-scrollable -wms1000 -wms-right">
          <div class="wms-scoreboard-container">
            <div class="wms-scoreboard">
              <div class="wms-scoreboard__header">
                <span class="wms-scoreboard__league"> </span>
                <span class="wms-scoreboard__season"> </span>
              </div>
              <ul class="wms-scoreboard__events">
                <li class="wms-scoreboard__event">
                  <div class="wms-scoreboard-team">
                    <div class="wms-scoreboard__home-score"> </div>
                    <div class="wms-scoreboard__home"> </div>

                  </div>
                  <div class="wms-scoreboard-team"> 
                    <div class="wms-scoreboard__away-score"> </div>
                    <div class="wms-scoreboard__away"> </div>
                  </div>
                  <div class="wms-scoreboard__status">
                    <span class="wms-scoreboard__status-text"> </span>
                    <ul class="wms-scoreboard__scorers"></ul>
                    <ul class="wms-scoreboard__cards"></ul>
                  </div>
                </li>
              </ul>
              <div class="wms-scoreboard__fallback"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
